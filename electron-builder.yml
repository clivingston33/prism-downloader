appId: com.prism.desktop
productName: Prism
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - "**/*"
  - from: resources/prism-light.png
  - from: resources/prism-dark.png
  - from: resources/icon.ico
asar: true
asarUnpack:
  - node_modules/ffmpeg-static/**/*
publish:
  provider: github
  owner: clivingston33
  repo: prism
  releaseType: release
mac:
  target: dmg
  hardenedRuntime: true
  gatekeeperAssess: false
win:
  target: nsis
  sign: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
